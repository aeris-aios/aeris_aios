kind = "web"
previewPath = "/"
title = "AERIS"
version = "1.0.0"
id = "artifacts/atreyu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19040

[services.development]
run = "pnpm --filter @workspace/atreyu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atreyu", "run", "build" ]
publicDir = "artifacts/atreyu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19040"
BASE_PATH = "/"
