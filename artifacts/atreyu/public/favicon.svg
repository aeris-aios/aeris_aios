<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Three ascending signal bars -->
  <rect x="30" y="108" width="30" height="48" rx="10" fill="url(#bars)" opacity="0.55"/>
  <rect x="75" y="78"  width="30" height="78" rx="10" fill="url(#bars)" opacity="0.8"/>
  <rect x="120" y="24" width="30" height="132" rx="10" fill="url(#bars)"/>
</svg>
