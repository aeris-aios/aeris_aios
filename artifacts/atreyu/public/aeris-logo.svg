<svg width="148" height="36" viewBox="0 0 148 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="148" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: three ascending signal bars forming an apex motif -->
  <g filter="url(#glow)">
    <rect x="2"  y="20" width="5" height="12" rx="2.5" fill="url(#ag)" opacity="0.55"/>
    <rect x="10" y="13" width="5" height="19" rx="2.5" fill="url(#ag)" opacity="0.75"/>
    <rect x="18" y="5"  width="5" height="27" rx="2.5" fill="url(#ag)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="34" y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="19"
    font-weight="200"
    letter-spacing="7"
    fill="url(#ag)"
  >AERIS</text>
</svg>
