openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ATREYU API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: research
    description: Research Lab operations
  - name: content
    description: Content Studio operations
  - name: campaigns
    description: Campaign Workspace operations
  - name: knowledge
    description: Knowledge Base operations
  - name: automations
    description: Automations operations
  - name: projects
    description: Projects operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /research/jobs:
    get:
      operationId: listResearchJobs
      tags: [research]
      summary: List all research jobs
      responses:
        "200":
          description: List of research jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchJob"
    post:
      operationId: createResearchJob
      tags: [research]
      summary: Create and launch a research job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResearchJobBody"
      responses:
        "201":
          description: Created research job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchJob"
  /research/jobs/{id}:
    get:
      operationId: getResearchJob
      tags: [research]
      summary: Get research job details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Research job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteResearchJob
      tags: [research]
      summary: Delete a research job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /research/jobs/{id}/results:
    get:
      operationId: getResearchJobResults
      tags: [research]
      summary: Get results for a research job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Research results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchResult"
  /research/jobs/{id}/summarize:
    post:
      operationId: summarizeResearchJob
      tags: [research]
      summary: AI-summarize research job results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of summary
          content:
            text/event-stream: {}

  /content/assets:
    get:
      operationId: listContentAssets
      tags: [content]
      summary: List all content assets
      responses:
        "200":
          description: List of content assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentAsset"
    post:
      operationId: createContentAsset
      tags: [content]
      summary: Create a content asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentAssetBody"
      responses:
        "201":
          description: Created content asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentAsset"
  /content/assets/{id}:
    get:
      operationId: getContentAsset
      tags: [content]
      summary: Get a content asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentAsset"
    delete:
      operationId: deleteContentAsset
      tags: [content]
      summary: Delete a content asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /content/generate:
    post:
      operationId: generateContent
      tags: [content]
      summary: Generate content using AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContentBody"
      responses:
        "200":
          description: SSE stream of generated content
          content:
            text/event-stream: {}

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /knowledge:
    get:
      operationId: listKnowledgeItems
      tags: [knowledge]
      summary: List all knowledge items
      responses:
        "200":
          description: List of knowledge items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeItem"
    post:
      operationId: createKnowledgeItem
      tags: [knowledge]
      summary: Create a knowledge item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeItemBody"
      responses:
        "201":
          description: Created knowledge item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"
  /knowledge/{id}:
    get:
      operationId: getKnowledgeItem
      tags: [knowledge]
      summary: Get a knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"
    delete:
      operationId: deleteKnowledgeItem
      tags: [knowledge]
      summary: Delete a knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /automations:
    get:
      operationId: listAutomations
      tags: [automations]
      summary: List all automations
      responses:
        "200":
          description: List of automations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create an automation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationBody"
      responses:
        "201":
          description: Created automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
  /automations/{id}:
    get:
      operationId: getAutomation
      tags: [automations]
      summary: Get an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    put:
      operationId: updateAutomation
      tags: [automations]
      summary: Update an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationBody"
      responses:
        "200":
          description: Updated automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /automations/{id}/toggle:
    post:
      operationId: toggleAutomation
      tags: [automations]
      summary: Toggle automation enabled state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
  /automations/{id}/run:
    post:
      operationId: runAutomation
      tags: [automations]
      summary: Manually trigger an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRun"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [projects]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
        model:
          type: string
          enum: [sonnet, opus, haiku]
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ResearchJob:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sourceType:
          type: string
        status:
          type: string
        targets:
          type: string
        summary:
          type: string
          nullable: true
        apifyRunId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - sourceType
        - status
        - targets
        - createdAt
        - updatedAt
    ResearchResult:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        url:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobId
        - content
        - createdAt
    CreateResearchJobBody:
      type: object
      properties:
        title:
          type: string
        sourceType:
          type: string
          enum: [website, competitor, reviews, search, social, custom]
        targets:
          type: string
        scrapeTemplate:
          type: string
      required:
        - title
        - sourceType
        - targets

    ContentAsset:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        content:
          type: string
        platform:
          type: string
          nullable: true
        tone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - content
        - createdAt
        - updatedAt
    CreateContentAssetBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        content:
          type: string
        platform:
          type: string
        tone:
          type: string
      required:
        - title
        - type
        - content
    GenerateContentBody:
      type: object
      properties:
        type:
          type: string
          enum: [ad_copy, email, landing_page, social, headline, hook, offer, cta, blog_outline]
        platform:
          type: string
        tone:
          type: string
        audience:
          type: string
        context:
          type: string
        model:
          type: string
          enum: [sonnet, opus, haiku]
        variants:
          type: integer
      required:
        - type
        - context

    Campaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        objective:
          type: string
          nullable: true
        audience:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status
        - createdAt
        - updatedAt
    CreateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        objective:
          type: string
        audience:
          type: string
      required:
        - title
    UpdateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        objective:
          type: string
        audience:
          type: string

    KnowledgeItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        content:
          type: string
        tags:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        includeInContext:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - content
        - includeInContext
        - createdAt
        - updatedAt
    CreateKnowledgeItemBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [note, url, file, scraped]
        content:
          type: string
        tags:
          type: string
        url:
          type: string
        includeInContext:
          type: boolean
      required:
        - title
        - type
        - content

    Automation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        trigger:
          type: string
        action:
          type: string
        enabled:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - trigger
        - action
        - enabled
        - createdAt
        - updatedAt
    CreateAutomationBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        trigger:
          type: string
        action:
          type: string
      required:
        - title
        - trigger
        - action
    UpdateAutomationBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        trigger:
          type: string
        action:
          type: string
        enabled:
          type: boolean
    AutomationRun:
      type: object
      properties:
        id:
          type: integer
        automationId:
          type: integer
        status:
          type: string
        output:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - automationId
        - status
        - createdAt

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        useCase:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
        - updatedAt
    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        industry:
          type: string
        useCase:
          type: string
      required:
        - title

    DashboardStats:
      type: object
      properties:
        totalProjects:
          type: integer
        totalCampaigns:
          type: integer
        totalResearchJobs:
          type: integer
        totalContentAssets:
          type: integer
        totalKnowledgeItems:
          type: integer
        totalAutomations:
          type: integer
        activeAutomations:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - totalProjects
        - totalCampaigns
        - totalResearchJobs
        - totalContentAssets
        - totalKnowledgeItems
        - totalAutomations
        - activeAutomations
        - recentActivity
    ActivityItem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - type
        - title
        - createdAt

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
